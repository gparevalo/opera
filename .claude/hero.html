<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Opera Surgical Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Avant+Garde+Replacement:wght@400;700&family=Jaeggers+Rough+Script&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Avant Garde Replacement', sans-serif;
            background-color: #0a1c35;
            color: #f1f1f1;
            overflow-x: hidden;
        }

        .hero {
            height: 100vh;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #001f3f, #0a1c35);
            z-index: 0;
        }

        .hero-content {
            position: relative;
            z-index: 1;
            max-width: 800px;
            padding: 0 1rem;
        }

        .hero-title {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 1rem;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .hero-subtitle {
            font-size: 1.2rem;
            color: #d4af37;
            margin-bottom: 2rem;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }

        .hero-particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            animation: float 4s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(-10px); }
            50% { transform: translateY(10px); }
        }
    </style>
</head>
<body>
    <section class="hero">
        <div class="hero-content">
            <div class="hero-title">Precision. Trust. Excellence.</div>
            <div class="hero-subtitle">Opera Surgical Center</div>
        </div>
        <div class="hero-particles">
            <div class="particle" style="top: 10%; left: 20%; animation-duration: 6s;"></div>
            <div class="particle" style="top: 30%; left: 60%; animation-duration: 8s;"></div>
            <div class="particle" style="top: 70%; left: 40%; animation-duration: 5s;"></div>
            <div class="particle" style="top: 50%; left: 80%; animation-duration: 7s;"></div>
        </div>
    </section>
</body>
</html>
