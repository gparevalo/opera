kind = "web"
previewPath = "/"
title = "Ópera Surgical Center"
version = "1.0.0"
id = "artifacts/opera"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23671

[services.development]
run = "pnpm --filter @workspace/opera run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/opera", "run", "build" ]
publicDir = "artifacts/opera/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23671"
BASE_PATH = "/"
