<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5, viewport-fit=cover" />
    <meta name="theme-color" content="#07090c" />

    <!-- Base metadata (overridden per-page via react-helmet-async) -->
    <title>Ópera Surgical Center | Centro Quirúrgico Premium · Quito, Ecuador</title>
    <meta name="description" content="Centro quirúrgico privado premium en Quito para especialistas médicos. Quirófanos listos, soporte perioperatorio 360° y coordinación dedicada. Agenda un recorrido privado." />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Ópera Surgical Center" />
    <meta name="geo.region" content="EC-P" />
    <meta name="geo.placename" content="Quito, Ecuador" />

    <!-- Open Graph -->
    <meta property="og:site_name" content="Ópera Surgical Center" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://operasurgicalcenter.com/" />
    <meta property="og:title" content="Ópera Surgical Center | Centro Quirúrgico Premium · Quito" />
    <meta property="og:description" content="Centro quirúrgico privado premium en Quito para especialistas médicos. Quirófanos listos, soporte perioperatorio 360° y coordinación dedicada." />
    <meta property="og:image" content="https://operasurgicalcenter.com/opengraph.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="es_EC" />
    <meta property="og:locale:alternate" content="en_US" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Ópera Surgical Center | Centro Quirúrgico Premium · Quito" />
    <meta name="twitter:description" content="Centro quirúrgico privado premium en Quito para especialistas médicos. Quirófanos listos, soporte perioperatorio 360°." />
    <meta name="twitter:image" content="https://operasurgicalcenter.com/opengraph.jpg" />

    <!-- Canonical (overridden per-page) -->
    <link rel="canonical" href="https://operasurgicalcenter.com/" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Fonts: preconnect first, then load with display=swap -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />

    <!-- Spinner keyframe for lazy-load fallback -->
    <style>
      @keyframes spin { to { transform: rotate(360deg); } }
      /* Prevent FOUC — app background matches site ink */
      html, body { background: #07090c; margin: 0; }
    </style>
  </head>
  <body>
    <noscript>
      <style>
        .noscript-msg {
          display: flex; align-items: center; justify-content: center;
          min-height: 100vh; background: #07090c;
          font-family: Inter, system-ui, sans-serif;
          color: #c4c8cc; text-align: center; padding: 2rem;
        }
        .noscript-msg strong { color: #c9a84c; display: block; font-size: 1.25rem; margin-bottom: 0.5rem; }
      </style>
      <div class="noscript-msg">
        <div>
          <strong>Ópera Surgical Center</strong>
          Este sitio requiere JavaScript para funcionar. Por favor activa JavaScript en tu navegador.
        </div>
      </div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
